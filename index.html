<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Display font (changeling-neo) — Adobe Typekit -->
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/efx4kwc.css" />
    <!-- Body text uses Helvetica Neue (system font); wordmark uses changeling-neo-stencil (Typekit). Mono (Space Mono) is self-hosted in /public/fonts -->
    <link rel="preload" href="/fonts/space-mono-400.woff2" as="font" type="font/woff2" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://www.mettaire.com/" />
    <meta name="description" content="METTAIRE — the portfolio of Daniel Nelson: multimedia paintings, software, sculpture, and tattoo work exploring absurdism, nihilism, and existentialism." />
    <meta name="theme-color" content="#050505" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="METTAIRE" />
    <meta property="og:title" content="METTAIRE" />
    <meta property="og:description" content="The portfolio of Daniel Nelson — multimedia art, software, sculpture, and tattoo work exploring existential themes." />
    <meta property="og:url" content="https://www.mettaire.com/" />
    <meta property="og:image" content="https://www.mettaire.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="METTAIRE — Daniel Nelson, art / software" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="METTAIRE" />
    <meta name="twitter:description" content="The portfolio of Daniel Nelson — multimedia art, software, sculpture, and tattoo work exploring existential themes." />
    <meta name="twitter:image" content="https://www.mettaire.com/og-image.jpg" />

    <title>METTAIRE</title>
